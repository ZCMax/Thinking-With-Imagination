<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 860" role="img" aria-labelledby="title desc">
  <title id="title">Astra thinking with imagination flow</title>
  <desc id="desc">Astra-VL reads observed context, sends an action query to a large Astra-WM world simulator, receives an imagined view above it, and outputs a spatial answer below it.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="7" markerHeight="7" refX="5.8" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-teal" markerWidth="7" markerHeight="7" refX="5.8" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#12806a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="7" markerHeight="7" refX="5.8" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#6d4ac7"/>
    </marker>
    <filter id="soft-shadow" x="-16%" y="-20%" width="132%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="context-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="wm-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f1faf6"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="novel-fill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8f5ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <rect width="1500" height="860" rx="34" fill="#ffffff"/>

  <!-- Observed context -->
  <g transform="translate(62 142)">
    <text x="0" y="0" fill="#143f79" font-family="Charter, Georgia, serif" font-size="34" font-weight="700">Observed Context</text>

    <g transform="translate(0 36)" filter="url(#soft-shadow)">
      <rect width="214" height="136" rx="16" fill="url(#context-fill)" stroke="#2b6cb0" stroke-width="3.5"/>
      <rect x="20" y="24" width="76" height="48" rx="7" fill="#d8c4a5"/>
      <rect x="116" y="24" width="72" height="62" rx="4" fill="#b8734a"/>
      <rect x="124" y="31" width="54" height="30" rx="3" fill="#314155"/>
      <rect x="26" y="82" width="162" height="32" rx="7" fill="#cfd9c4"/>
    </g>

    <g transform="translate(0 204)" filter="url(#soft-shadow)">
      <rect width="214" height="136" rx="16" fill="url(#context-fill)" stroke="#2b6cb0" stroke-width="3.5"/>
      <rect x="24" y="26" width="60" height="90" rx="5" fill="#cbd7e5"/>
      <rect x="104" y="26" width="86" height="58" rx="7" fill="#d7c3a4"/>
      <circle cx="140" cy="102" r="23" fill="#b7a083"/>
      <rect x="110" y="62" width="74" height="12" rx="3" fill="#6b7280"/>
    </g>

    <g transform="translate(0 372)" filter="url(#soft-shadow)">
      <rect width="214" height="136" rx="16" fill="url(#context-fill)" stroke="#2b6cb0" stroke-width="3.5"/>
      <rect x="24" y="32" width="72" height="74" rx="6" fill="#e0d4c2"/>
      <rect x="118" y="28" width="68" height="88" rx="5" fill="#cdd7bd"/>
      <path d="M140 88 C132 68 142 50 158 40 C176 58 176 78 164 100 Z" fill="#69875f"/>
      <rect x="30" y="88" width="58" height="20" rx="4" fill="#a97854"/>
    </g>
  </g>

  <!-- Imagined view above Astra-VL -->
  <g transform="translate(372 82)" filter="url(#soft-shadow)">
    <text x="107" y="-10" text-anchor="middle" fill="#6d4ac7" font-family="Charter, Georgia, serif" font-size="26" font-weight="700">Imagined View</text>
    <rect width="214" height="136" rx="16" fill="url(#novel-fill)" stroke="#6d4ac7" stroke-width="3.5"/>
    <rect x="20" y="24" width="76" height="48" rx="7" fill="#d8c4a5"/>
    <rect x="116" y="24" width="72" height="62" rx="4" fill="#b8734a"/>
    <rect x="124" y="31" width="54" height="30" rx="3" fill="#314155"/>
    <rect x="26" y="82" width="162" height="32" rx="7" fill="#cfd9c4"/>
    <path d="M36 100 C58 78 88 76 116 92 C138 105 160 104 184 88" fill="none" stroke="#6d4ac7" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  </g>

  <!-- Astra-VL -->
  <g transform="translate(360 302)" filter="url(#soft-shadow)">
    <rect width="252" height="220" rx="24" fill="#ffffff" stroke="#2b6cb0" stroke-width="4"/>
    <circle cx="126" cy="60" r="38" fill="#eef6ff" stroke="#2b6cb0" stroke-width="3"/>
    <rect x="109" y="48" width="34" height="26" rx="8" fill="#2b6cb0"/>
    <circle cx="118" cy="61" r="4.2" fill="#ffffff"/>
    <circle cx="134" cy="61" r="4.2" fill="#ffffff"/>
    <path d="M118 73 C123 79 129 79 134 73" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <text x="126" y="128" text-anchor="middle" fill="#143f79" font-family="Charter, Georgia, serif" font-size="40" font-weight="700">Astra-VL</text>
    <text x="126" y="164" text-anchor="middle" fill="#51606f" font-family="Charter, Georgia, serif" font-size="24">action policy</text>
    <text x="126" y="194" text-anchor="middle" fill="#51606f" font-family="Charter, Georgia, serif" font-size="24">+ reasoner</text>
  </g>

  <!-- Context to Astra-VL -->
  <path d="M282 248 C314 270 334 300 356 344" fill="none" stroke="#2563eb" stroke-width="3.2" stroke-dasharray="10 8" marker-end="url(#arrow-blue)"/>
  <path d="M282 414 C312 410 334 400 356 388" fill="none" stroke="#2563eb" stroke-width="3.2" stroke-dasharray="10 8" marker-end="url(#arrow-blue)"/>
  <path d="M282 582 C318 538 338 500 356 456" fill="none" stroke="#2563eb" stroke-width="3.2" stroke-dasharray="10 8" marker-end="url(#arrow-blue)"/>

  <!-- Imagined evidence returns to Astra-VL -->
  <path d="M479 220 V296" fill="none" stroke="#6d4ac7" stroke-width="3.2" stroke-dasharray="10 8" marker-end="url(#arrow-purple)"/>

  <!-- Spatial answer directly below Astra-VL -->
  <path d="M486 526 V592" fill="none" stroke="#12806a" stroke-width="3.2" marker-end="url(#arrow-teal)"/>
  <g transform="translate(374 604)" filter="url(#soft-shadow)">
    <rect width="224" height="132" rx="20" fill="#fffdf7" stroke="#d98b00" stroke-width="4"/>
    <text x="112" y="50" text-anchor="middle" fill="#c97300" font-family="Charter, Georgia, serif" font-size="30" font-weight="700">Spatial Answer</text>
    <circle cx="112" cy="91" r="24" fill="none" stroke="#d98b00" stroke-width="5"/>
    <path d="M98 90 L110 103 L134 74" fill="none" stroke="#d98b00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Large Astra-WM on right -->
  <g transform="translate(720 78)" filter="url(#soft-shadow)">
    <rect width="700" height="664" rx="32" fill="url(#wm-fill)" stroke="#b8d9cf" stroke-width="4"/>
    <text x="350" y="66" text-anchor="middle" fill="#126b59" font-family="Charter, Georgia, serif" font-size="48" font-weight="700">Astra-WM</text>
    <text x="350" y="104" text-anchor="middle" fill="#51606f" font-family="Charter, Georgia, serif" font-size="25">action-conditioned world simulator</text>

    <g transform="translate(72 148)">
      <rect width="556" height="412" rx="12" fill="#ffffff" stroke="#263246" stroke-width="6"/>
      <path d="M0 116 H556 M174 0 V412 M386 0 V412" stroke="#e2e8f0" stroke-width="2.4"/>
      <rect x="64" y="158" width="132" height="172" rx="16" fill="#e8dfd2" stroke="#9ca3af" stroke-width="4"/>
      <circle cx="278" cy="224" r="64" fill="#f2efe7" stroke="#9ca3af" stroke-width="4"/>
      <rect x="418" y="124" width="66" height="182" rx="7" fill="#d7dde4" stroke="#9ca3af" stroke-width="4"/>

      <path d="M98 62 C222 22 416 38 488 124 C558 208 472 344 304 364 C148 382 62 302 68 180 C72 116 78 82 98 62 Z"
            fill="#3b82f6" opacity="0.13" stroke="#2563eb" stroke-width="5" stroke-dasharray="14 11"/>
      <text x="278" y="388" text-anchor="middle" fill="#2563eb" font-family="Charter, Georgia, serif" font-size="24" font-weight="700">context-supported region</text>

      <circle cx="136" cy="116" r="17" fill="#2563eb"/>
      <path d="M136 116 L304 142 L192 238 Z" fill="#3b82f6" opacity="0.28" stroke="#2563eb" stroke-width="3"/>
      <circle cx="452" cy="120" r="17" fill="#2563eb"/>
      <path d="M452 120 L294 158 L408 252 Z" fill="#3b82f6" opacity="0.23" stroke="#2563eb" stroke-width="3"/>
      <circle cx="170" cy="322" r="17" fill="#2563eb"/>
      <path d="M170 322 L294 252 L214 168 Z" fill="#3b82f6" opacity="0.2" stroke="#2563eb" stroke-width="3"/>

      <path d="M138 140 C152 224 214 278 306 282 C372 286 408 258 438 210"
            fill="none" stroke="#12806a" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-teal)"/>
      <circle cx="360" cy="282" r="19" fill="#6d4ac7"/>
      <path d="M360 282 L450 172 L492 332 Z" fill="#8b5cf6" opacity="0.28" stroke="#6d4ac7" stroke-width="4"/>
      <text x="382" y="352" fill="#6d4ac7" font-family="Charter, Georgia, serif" font-size="25" font-weight="700">novel pose</text>
    </g>
  </g>

  <!-- Action query and simulator output -->
  <path d="M616 392 C654 382 682 374 716 366" fill="none" stroke="#12806a" stroke-width="3.4" marker-end="url(#arrow-teal)"/>
  <text x="662" y="338" text-anchor="middle" fill="#126b59" font-family="Charter, Georgia, serif" font-size="27" font-weight="700">Action Query</text>

  <path d="M1070 78 C920 18 690 28 586 92" fill="none" stroke="#6d4ac7" stroke-width="3.2" stroke-dasharray="10 8" marker-end="url(#arrow-purple)"/>
</svg>
